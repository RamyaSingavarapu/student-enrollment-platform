<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thymeleaf demo home</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link th:href="@{/styles/index.css}" rel="stylesheet" />
</head>
<body>
<h1>Update Student</h1>
<form th:action="@{/students/{id}(id=${student.id})}" th:object="${student}" method="post">
    <input type="hidden" name="_method" value="put" />
    <div>
        <input type="hidden" th:field="*{id}"/>
    </div>
    <div>
        <label>First name</label>
        <input type="text" th:field="*{firstName}"/>
    </div>
    <div>
        <label>Last name</label>
        <input type="text" th:field="*{lastName}"/>
    </div>
    <div>
        <label>Roll number</label>
        <input type="text" th:field="*{rollNumber}"/>
    </div>
    <div>
        <label>Department</label>
        <input type="text" th:field="*{department}" />
    </div>
    <div>
        <button type="submit">Update</button>
    </div>
</form>
</body>
</html>
