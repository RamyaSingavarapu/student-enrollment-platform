<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thymeleaf demo home</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link th:href="@{/styles/index.css}" rel="stylesheet" />
    <script th:src="@{/scripts/studentList.js}"></script>
</head>
<body>
<h1 th:text="|Student list|" />
<a th:href="@{/create-student}">Create Student</a>
<ul th:each="student: ${students}">
    <li>LastName: <span th:text="${student.lastName}"/></li>
    <li>RollNum: <span th:text="${student.rollNumber}"/></li>
    <li>Details: <a th:href="@{/student/{id}(id=${student.id})}">link</a></li>
</ul>
<button id="showMore">Show More</button>
</body>
</html>
